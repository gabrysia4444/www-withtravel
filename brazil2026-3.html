<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brazil 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3c;
    --gold: #e8a020;
    --blue: #1a3a6b;
    --white: #ffffff;
    --glass: rgba(255,255,255,0.12);
    --glass-border: rgba(255,255,255,0.2);
    --dark: #0a0a0a;
    --surface: rgba(255,255,255,0.06);
    --text-primary: #f5f5f7;
    --text-secondary: rgba(245,245,247,0.6);
    --accent: #34d399;
    --gold-light: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* ─── HERO ─── */
  #hero {
    position: relative;
    height: 100vh;
    min-height: 700px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #hero-bg {
    position: absolute;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1518639192441-8fce0a366e2e?w=1800&q=90&fit=crop') center/cover no-repeat;
    transform: scale(1.05);
    animation: heroZoom 20s ease-in-out infinite alternate;
  }

  @keyframes heroZoom {
    from { transform: scale(1.05); }
    to   { transform: scale(1.12); }
  }

  #hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.35) 40%,
      rgba(0,0,0,0.75) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    animation: heroFadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes heroFadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-light);
    margin-bottom: 20px;
    opacity: 0.9;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(72px, 12vw, 140px);
    font-weight: 300;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--white);
    margin-bottom: 24px;
  }

  .hero-title span {
    display: block;
    font-weight: 600;
    background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: 17px;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.02em;
    margin-bottom: 52px;
  }

  .hero-dates {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
  }

  .hero-dates::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .btn-show {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.95);
    color: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    padding: 16px 36px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.01em;
    text-decoration: none;
  }

  .btn-show:hover {
    background: var(--white);
    transform: scale(1.04) translateY(-2px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .btn-show svg {
    transition: transform 0.3s ease;
  }

  .btn-show:hover svg {
    transform: translateY(3px);
  }

  .hero-scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0.5;
    animation: bounce 2.5s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  .hero-scroll-hint span {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ─── PLAN SECTION ─── */
  #plan {
    min-height: 100vh;
    background: #0d0d0d;
    padding: 80px 0 120px;
  }

  .plan-header {
    text-align: center;
    padding: 0 24px;
    margin-bottom: 56px;
    animation: fadeIn 0.6s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .plan-eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .plan-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  .plan-sub {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  /* ─── DAY TABS ─── */
  .days-rail-wrap {
    overflow-x: auto;
    padding: 0 24px;
    margin-bottom: 40px;
    scrollbar-width: none;
  }

  .days-rail-wrap::-webkit-scrollbar { display: none; }

  .days-rail {
    display: flex;
    gap: 10px;
    width: max-content;
    margin: 0 auto;
  }

  .day-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 14px 20px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    min-width: 80px;
    user-select: none;
  }

  .day-tab:hover {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }

  .day-tab.active {
    background: var(--white);
    border-color: var(--white);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(255,255,255,0.12);
  }

  .day-tab .day-num {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
    font-family: 'Cormorant Garamond', serif;
  }

  .day-tab.active .day-num { color: #0a0a0a; }

  .day-tab .day-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .day-tab.active .day-label { color: rgba(0,0,0,0.5); }

  .day-tab .day-city {
    font-size: 10px;
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .day-tab.active .day-city { color: var(--green); }

  /* ─── DAY CONTENT ─── */
  .day-panels {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .day-panel {
    display: none;
    animation: panelIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }

  .day-panel.active { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-hero-card {
    background: linear-gradient(135deg, var(--surface), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 28px 28px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .day-hero-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
  }

  .day-hero-info h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
  }

  .day-hero-info p {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .day-hero-info .day-badge {
    display: inline-block;
    background: rgba(52,211,153,0.15);
    border: 1px solid rgba(52,211,153,0.3);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 6px;
  }

  /* ─── TIMELINE ─── */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .tl-item {
    display: flex;
    gap: 0;
    position: relative;
  }

  .tl-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 64px;
    flex-shrink: 0;
  }

  .tl-time {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    padding-top: 18px;
    letter-spacing: 0.03em;
  }

  .tl-dot-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  /* Right side */
  .tl-right {
    flex: 1;
    padding: 14px 0 14px 20px;
    position: relative;
  }

  .tl-connector {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 20px;
    flex-shrink: 0;
  }

  .tl-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    margin-top: 22px;
    box-shadow: 0 0 0 3px rgba(52,211,153,0.2);
    z-index: 1;
  }

  .tl-line {
    width: 1px;
    flex: 1;
    background: rgba(255,255,255,0.08);
    min-height: 20px;
  }

  .tl-item:last-child .tl-line { display: none; }

  .tl-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 16px 18px;
    transition: all 0.2s ease;
  }

  .tl-card:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.12);
    transform: translateX(3px);
  }

  .tl-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .tl-emoji { font-size: 18px; }

  .tl-activity {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .tl-desc {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.5;
  }

  .tl-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 100px;
    margin-top: 8px;
  }

  .tag-food { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
  .tag-sight { background: rgba(52,211,153,0.12); color: var(--accent); border: 1px solid rgba(52,211,153,0.25); }
  .tag-hotel { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.25); }
  .tag-transport { background: rgba(96,165,250,0.12); color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }
  .tag-free { background: rgba(244,63,94,0.12); color: #fb7185; border: 1px solid rgba(244,63,94,0.25); }
  .tag-nature { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

  .tl-hint {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--accent);
    opacity: 0.7;
  }

  /* ─── Modal buttons ─── */
  .modal-btn-maps {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 1.5px solid;
  }
  .modal-btn-green {
    background: rgba(52,211,153,0.15);
    border-color: rgba(52,211,153,0.4);
    color: #34d399;
  }
  .modal-btn-green:hover {
    background: rgba(52,211,153,0.28);
    transform: translateY(-1px);
  }
  .modal-btn-blue {
    background: rgba(96,165,250,0.15);
    border-color: rgba(96,165,250,0.4);
    color: #93c5fd;
  }
  .modal-btn-blue:hover {
    background: rgba(96,165,250,0.28);
    transform: translateY(-1px);
  }

  /* ─── Footer ─── */
  .plan-footer {
    text-align: center;
    padding-top: 60px;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  /* ─── Responsive ─── */
  @media (max-width: 600px) {
    .day-hero-card { flex-direction: column; text-align: center; }
    .tl-time { font-size: 11px; }
    .tl-activity { font-size: 14px; }
  }

  /* ─── CLICKABLE CARD ─── */
  .tl-card.has-detail {
    cursor: pointer;
    position: relative;
  }
  .tl-card.has-detail::after {
    content: '↗';
    position: absolute;
    top: 14px; right: 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.25);
    transition: color 0.2s, transform 0.2s;
  }
  .tl-card.has-detail:hover::after {
    color: var(--accent);
    transform: translate(2px,-2px);
  }
  .tl-card.has-detail:hover {
    border-color: rgba(52,211,153,0.3);
  }

  /* ─── MODAL ─── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  #modal {
    background: #161616;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
    transform: scale(0.93) translateY(16px);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  #modal-overlay.open #modal {
    transform: scale(1) translateY(0);
  }
  #modal-img-wrap {
    width: 100%;
    height: 220px;
    background: #222;
    position: relative;
    overflow: hidden;
  }
  #modal-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  #modal-img-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
  }
  #modal-img-placeholder span { font-size: 36px; }
  #modal-body {
    padding: 24px 24px 28px;
  }
  #modal-emoji-title {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  #modal-emoji { font-size: 28px; }
  #modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
  }
  #modal-desc {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  #modal-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .modal-btn-maps {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(52,211,153,0.12);
    border: 1px solid rgba(52,211,153,0.3);
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .modal-btn-maps:hover {
    background: rgba(52,211,153,0.22);
    transform: translateY(-1px);
  }
  #modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }
  #modal-close:hover { background: rgba(0,0,0,0.8); }
  #modal-img-wrap { position: relative; }
</style>
</head>
<body>

<!-- ════════════════ HERO ════════════════ -->
<section id="hero">
  <div id="hero-bg"></div>
  <div id="hero-overlay"></div>

  <div class="hero-content">
    <h1 class="hero-title">
      Brazil<span>2026</span>
    </h1>
    <p class="hero-sub">12 days · Rio de Janeiro · Ilha Grande</p>
    <div class="hero-dates">May 16 – May 27, 2026</div>
    <br>
    <a href="#plan" class="btn-show">
      Show Plan
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M3 9l5 5 5-5" stroke="#0a0a0a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>

  <div class="hero-scroll-hint">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M10 4v12M4 11l6 6 6-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>scroll</span>
  </div>
</section>

<!-- ════════════════ PLAN ════════════════ -->
<section id="plan">
  <div class="plan-header">
    <p class="plan-eyebrow">12 Days · Rio de Janeiro & Ilha Grande</p>
    <h2 class="plan-title">Your Itinerary</h2>
    <p class="plan-sub">Tap a day to explore the schedule</p>
  </div>

  <!-- DAY TABS -->
  <div class="days-rail-wrap">
    <div class="days-rail" id="daysRail"></div>
  </div>

  <!-- DAY PANELS -->
  <div class="day-panels" id="dayPanels"></div>

</section>

<!-- ════════════════ MODAL ════════════════ -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-img-wrap">
      <button id="modal-close" onclick="closeModal()">✕</button>
      <img id="modal-img" src="" alt="" style="display:none"/>
      <div id="modal-img-placeholder"><span id="modal-ph-emoji"></span><p>No photo yet</p></div>
    </div>
    <div id="modal-body">
      <div id="modal-emoji-title">
        <span id="modal-emoji"></span>
        <h2 id="modal-title"></h2>
      </div>
      <p id="modal-desc"></p>
      <div id="modal-actions">
        <a id="modal-maps-btn" href="#" target="_blank" class="modal-btn-maps modal-btn-green" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          Open in Google Maps
        </a>
        <a id="modal-booking-btn" href="#" target="_blank" class="modal-btn-maps modal-btn-blue" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          View on Booking.com

const tagClass = { food:'tag-food', sight:'tag-sight', hotel:'tag-hotel', transport:'tag-transport', free:'tag-free', nature:'tag-nature' };
const tagLabel = { food:'Food', sight:'Sightseeing', hotel:'Hotel', transport:'Transfer', free:'Leisure', nature:'Nature' };

const rail = document.getElementById('daysRail');
const panels = document.getElementById('dayPanels');

days.forEach((d, i) => {
  const tab = document.createElement('div');
  tab.className = 'day-tab' + (i === 0 ? ' active' : '');
  tab.innerHTML = `
    <span class="day-num">${d.date.split(' ')[1]}</span>
    <span class="day-label">${d.weekday}</span>
    <span class="day-city">${d.city}</span>
  `;
  tab.addEventListener('click', () => {
    document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + i).classList.add('active');
    tab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  });
  rail.appendChild(tab);

  const panel = document.createElement('div');
  panel.className = 'day-panel' + (i === 0 ? ' active' : '');
  panel.id = 'panel-' + i;

  const timelineItems = d.events.map(ev => {
    const det = details[ev.activity];
    const clickable = det ? 'has-detail' : '';
    const dataAttrs = det
      ? `data-emoji="${ev.emoji.replace(/"/g,'')}" data-title="${ev.activity.replace(/"/g,'&quot;')}" data-desc="${ev.desc.replace(/"/g,'&quot;')}" data-photo="${(det.photo||'').replace(/"/g,'&quot;')}" data-maps="${(det.maps||'').replace(/"/g,'&quot;')}" data-booking="${(det.booking||'').replace(/"/g,'&quot;')}"`
      : '';
    return `
    <div class="tl-item">
      <div class="tl-left">
        <span class="tl-time">${ev.time}</span>
      </div>
      <div class="tl-connector">
        <div class="tl-dot"></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-right">
        <div class="tl-card ${clickable}" ${dataAttrs}>
          <div class="tl-card-top">
            <span class="tl-emoji">${ev.emoji}</span>
            <span class="tl-activity">${ev.activity}</span>
          </div>
          <p class="tl-desc">${ev.desc}</p>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;">
            <span class="tl-tag ${tagClass[ev.tag] || ''}">${tagLabel[ev.tag] || ev.tag}</span>
            ${det ? `<span class="tl-hint">📸 Tap for details</span>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div class="day-hero-card">
      <div class="day-hero-icon">${d.emoji}</div>
      <div class="day-hero-info">
        <div class="day-badge">${d.date} · ${d.weekday}</div>
        <h2>${d.title}</h2>
        <p>${d.desc}</p>
      </div>
    </div>
    <div class="timeline">${timelineItems}</div>
  `;
  panels.appendChild(panel);
});

// ─── MODAL LOGIC ───────────────────────────────────────────────

// Event delegation — no inline onclick needed
document.getElementById('dayPanels').addEventListener('click', function(e) {
  const card = e.target.closest('.tl-card.has-detail');
  if (!card) return;
  openModal(
    card.dataset.emoji,
    card.dataset.title,
    card.dataset.desc,
    card.dataset.photo,
    card.dataset.maps,
    card.dataset.booking
  );
});

function openModal(emoji, title, desc, photo, maps, booking) {
  document.getElementById('modal-emoji').textContent = emoji;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;

  const img = document.getElementById('modal-img');
  const ph = document.getElementById('modal-img-placeholder');
  document.getElementById('modal-ph-emoji').textContent = emoji;

  if (photo) {
    img.src = photo;
    img.style.display = 'block';
    ph.style.display = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display = 'flex';
  }

  const mapsBtn = document.getElementById('modal-maps-btn');
  if (maps) {
    mapsBtn.href = maps;
    mapsBtn.style.display = 'inline-flex';
  } else {
    mapsBtn.style.display = 'none';
  }

  const bookingBtn = document.getElementById('modal-booking-btn');
  if (booking) {
    bookingBtn.href = booking;
    bookingBtn.style.display = 'inline-flex';
  } else {
    bookingBtn.style.display = 'none';
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
